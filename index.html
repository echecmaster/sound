<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Incredibox - Ultra Sound Studio</title>
    <style>
        :root {
            --bg: #08080a; --panel: #121217; --accent: #00f2ff;
            --b: #ff4757; --f: #1e90ff; --m: #2ed573; --v: #ffa502; --bb: #9b59b6;
        }
        body {
            margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden;
            touch-action: manipulation; /* Optimise le tactile */
        }
        
        #start-screen {
            position: absolute; inset: 0; background: #000; z-index: 2000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        #start-btn {
            padding: 20px 60px; font-size: 1.2rem; background: var(--accent);
            border: none; border-radius: 50px; cursor: pointer; font-weight: bold; color: #000;
        }

        .controls-wrapper {
            position: relative; width: 100px; height: 100px; margin: 10px;
            display: flex; justify-content: center; align-items: center; flex-shrink: 0;
        }
        #progress-ring { position: absolute; transform: rotate(-90deg); }
        #progress-ring circle { fill: none; stroke: #1a1a1a; stroke-width: 6; }
        #progress-ring .bar {
            stroke: var(--accent); stroke-width: 6; stroke-linecap: round;
            stroke-dasharray: 282.7; stroke-dashoffset: 282.7;
        }
        .master-btn {
            width: 70px; height: 70px; background: #1a1a1f; border: 1px solid #333;
            border-radius: 50%; color: white; font-size: 1.5rem; cursor: pointer;
            z-index: 10; display: flex; align-items: center; justify-content: center;
        }

        canvas { width: 100%; height: 40px; background: #000; opacity: 0.8; flex-shrink: 0; }

        /* Grille Mobile-Friendly */
        #grid-scroll-container {
            width: 100%; overflow-x: auto; flex-grow: 1; padding: 10px 0;
            display: flex; align-items: center;
            -webkit-overflow-scrolling: touch;
        }
        #grid-container {
            display: flex; flex-direction: column; gap: 5px; padding: 0 15px;
        }

        .dock { width: 100%; background: #050507; padding: 10px 0; border-top: 1px solid #222; overflow-y: auto; max-height: 35vh; }
        .dock-row { display: flex; gap: 6px; justify-content: center; margin-bottom: 6px; }
        
        .icon {
            width: 40px; height: 40px; border-radius: 8px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.7rem; font-weight: bold; color: rgba(0,0,0,0.8);
            transition: transform 0.1s; flex-shrink: 0;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        .icon.selected { border: 3px solid white; transform: scale(1.1); z-index: 5; }

        .icon[data-type="beat"] { background: var(--b); }
        .icon[data-type="fx"] { background: var(--f); }
        .icon[data-type="melody"] { background: var(--m); }
        .icon[data-type="voice"] { background: var(--v); }
        .icon[data-type="beatbox"] { background: var(--bb); }
    </style>
</head>
<body>

<div id="start-screen">
    <h1 style="color:var(--accent); font-size: 1.5rem; letter-spacing: 3px;">BEAT STUDIO MOBILE</h1>
    <button id="start-btn">LANCER</button>
</div>

<canvas id="visu"></canvas>

<div class="controls-wrapper">
    <svg id="progress-ring" width="100" height="100">
        <circle cx="50" cy="50" r="45"></circle>
        <circle class="bar" cx="50" cy="50" r="45" style="filter:none;"></circle>
    </svg>
    <button class="master-btn" id="master-control">⏸</button>
</div>

<div id="grid-scroll-container">
    <div id="grid-container"></div>
</div>

<div class="dock" id="main-dock"></div>

<script>
let audioCtx, analyser, dataArray, ctx, canvas;
let isPlaying = false, timerId = null;
const bpm = 120;
let nextNoteTime = 0;
let currentStep = 0;
let lastStep = -1;
let selectedSound = { id: 'b1', type: 'beat' }; // Son sélectionné par défaut

const rowSounds = ['b1', 'bb1', 'f1', 'm1', 'v1'];
const rowTypes = ['beat', 'beatbox', 'fx', 'melody', 'voice'];
const grid = [];
const cols = 32;

// --- DOCK DES SONS (CLIC POUR SÉLECTIONNER) ---
const categories = [{n:'beat', c:'b'}, {n:'fx', c:'f'}, {n:'melody', c:'m'}, {n:'voice', c:'v'}, {n:'beatbox', c:'bb'}];
categories.forEach(cat => {
    const row = document.createElement('div'); row.className = 'dock-row';
    for(let i=1; i<=5; i++) {
        const icon = document.createElement('div');
        icon.className = 'icon';
        icon.dataset.id = cat.c + i; 
        icon.dataset.type = cat.n;
        icon.innerText = (cat.c + i).toUpperCase();
        
        icon.onclick = () => {
            document.querySelectorAll('.dock .icon').forEach(i => i.classList.remove('selected'));
            icon.classList.add('selected');
            selectedSound = { id: icon.dataset.id, type: icon.dataset.type };
        };
        if(cat.c === 'b' && i === 1) icon.classList.add('selected');
        row.appendChild(icon);
    }
    document.getElementById('main-dock').appendChild(row);
});

// --- GRILLE CENTRALE ---
const gridContainer = document.getElementById('grid-container');
for(let r=0; r<5; r++) {
    const rowDiv = document.createElement('div'); 
    rowDiv.style.display = 'flex'; rowDiv.style.gap = '5px';
    
    // Header (clic pour changer le son de la ligne)
    const header = document.createElement('div');
    header.className = 'icon';
    header.dataset.type = rowTypes[r];
    header.innerText = rowSounds[r].toUpperCase();
    header.style.marginRight = '10px';
    header.style.position = 'sticky'; header.style.left = '0';
    
    header.onclick = () => {
        rowSounds[r] = selectedSound.id;
        header.dataset.type = selectedSound.type;
        header.innerText = selectedSound.id.toUpperCase();
        rowCells.forEach(cell => cell.dataset.type = selectedSound.type);
    };
    rowDiv.appendChild(header);

    const rowCells = [];
    for(let c=0; c<cols; c++) {
        const cell = document.createElement('div');
        cell.className = 'icon'; 
        cell.dataset.type = rowTypes[r];
        cell.style.opacity = '0.15';
        cell.dataset.active = '0';
        cell.onclick = () => {
            const isActive = cell.dataset.active === '1';
            cell.dataset.active = isActive ? '0' : '1';
            cell.style.opacity = isActive ? '0.15' : '1';
        };
        rowDiv.appendChild(cell);
        rowCells.push(cell);
    }
    gridContainer.appendChild(rowDiv);
    grid.push(rowCells);
}

// --- LOGIQUE AUDIO ---
document.getElementById('start-btn').onclick = async () => {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser(); analyser.connect(audioCtx.destination);
    canvas = document.getElementById('visu'); ctx = canvas.getContext('2d');
    document.getElementById('start-screen').remove();
    isPlaying = true; startLoop(); draw();
};

document.getElementById('master-control').onclick = () => {
    if (isPlaying) { isPlaying = false; clearTimeout(timerId); audioCtx.suspend(); document.getElementById('master-control').innerText = "▶"; }
    else { isPlaying = true; audioCtx.resume(); document.getElementById('master-control').innerText = "⏸"; startLoop(); }
};

function startLoop() {
    nextNoteTime = audioCtx.currentTime + 0.05;
    currentStep = 0;
    scheduler();
}

function scheduler() {
    while (nextNoteTime < audioCtx.currentTime + 0.1) {
        playStep(currentStep, nextNoteTime);
        const secondsPerBeat = 60.0 / bpm;
        nextNoteTime += 0.25 * secondsPerBeat;
        currentStep = (currentStep + 1) % cols;
    }
    timerId = setTimeout(scheduler, 25);
}

function playStep(stepIndex, time) {
    grid.forEach((row, rIndex) => {
        if (row[stepIndex].dataset.active === '1') engine(rowSounds[rIndex], time, stepIndex);
    });
    setTimeout(() => {
        if (lastStep >= 0) grid.forEach(r => r[lastStep].style.boxShadow = 'none');
        grid.forEach(r => r[stepIndex].style.boxShadow = 'inset 0 0 0 2px white');
        lastStep = stepIndex;
    }, (time - audioCtx.currentTime) * 1000);
}

// --- MOTEUR DE SON ---
function engine(id, t, step) {
    if(id === 'b1') playDrum(t, 60, 0.3, 0.8, 'sine');
    if(id === 'b2') playNoise(t, 0.05, 0.1);
    if(id.startsWith('m')) {
        let f = [261, 329, 392, 523, 440, 349, 293, 261][(step + parseInt(id[1]||1)) % 8];
        playSynth(t, f, 0.3, 'sine');
    }
    if(id.startsWith('bb')) playDrum(t, 80, 0.2, 0.7, 'square');
    if(id.startsWith('f') || id.startsWith('v')) playSynth(t, 440, 0.5, 'sawtooth', true);
}

function playDrum(t, f, d, vol, type) {
    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
    o.type = type; o.frequency.setValueAtTime(f, t);
    o.frequency.exponentialRampToValueAtTime(0.01, t + d);
    g.gain.setValueAtTime(vol, t); g.gain.exponentialRampToValueAtTime(0.01, t + d);
    o.connect(g); g.connect(analyser); o.start(t); o.stop(t + d);
}

function playSynth(t, f, d, type, slide=false) {
    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
    o.type = type; o.frequency.setValueAtTime(f, t);
    if(slide) o.frequency.exponentialRampToValueAtTime(f/2, t + d);
    g.gain.setValueAtTime(0.1, t); g.gain.linearRampToValueAtTime(0, t + d);
    o.connect(g); g.connect(analyser); o.start(t); o.stop(t + d);
}

function playNoise(t, vol, d) {
    const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * d, audioCtx.sampleRate);
    for (let i = 0; i < buffer.length; i++) buffer.getChannelData(0)[i] = Math.random() * 2 - 1;
    const n = audioCtx.createBufferSource(); n.buffer = buffer;
    const g = audioCtx.createGain(); g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.01, t + d);
    n.connect(g); g.connect(analyser); n.start(t);
}

function draw() {
    requestAnimationFrame(draw);
    if(!isPlaying) return;
    dataArray = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(dataArray);
    ctx.fillStyle = 'black'; ctx.fillRect(0,0,canvas.width,canvas.height);
    for(let i=0; i<dataArray.length; i+=2) {
        ctx.fillStyle = `hsl(${i*1.2 + 190}, 100%, 50%)`;
        ctx.fillRect(i*2, canvas.height, 2, -dataArray[i]/3);
    }
    let dur = (60/bpm)*8;
    document.querySelector('.bar').style.strokeDashoffset = 282.7 - ((audioCtx.currentTime % dur) / dur * 282.7);
}
</script>
</body>
</html>
